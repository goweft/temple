name: "temple"
description: "Fail the build when a repo drifts past its declared single-purpose scope."
branding:
  icon: "crop"
  color: "purple"

inputs:
  version:
    description: >-
      temple release to install: a tag (v0.3.1), a bare version (0.3.1), or "latest".
      Defaults to the release this action ships with, so pinning the action pins the
      binary. "latest" is resolved at run time and is not reproducible.
    required: false
    default: "v0.3.1"
  github-token:
    description: >-
      Token used to resolve "latest" through the GitHub API. Only read when
      version is "latest"; unauthenticated lookups are rate limited on shared
      runner IPs and fail intermittently.
    required: false
    default: ${{ github.token }}
  config:
    description: "Path to the scope contract."
    required: false
    default: "temple.toml"
  root:
    description: "Repo root to inspect."
    required: false
    default: "."
  format:
    description: "Output format: text, json, or sarif."
    required: false
    default: "text"

runs:
  using: "composite"
  steps:
    - name: install temple
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        set -euo pipefail

        case "$(uname -s)" in
          Linux)  OS=linux ;;
          Darwin) OS=darwin ;;
          *) echo "temple: unsupported runner OS '$(uname -s)' — linux and darwin only" >&2; exit 1 ;;
        esac

        case "$(uname -m)" in
          x86_64|amd64)  ARCH=amd64 ;;
          aarch64|arm64) ARCH=arm64 ;;
          *) echo "temple: unsupported runner architecture '$(uname -m)'" >&2; exit 1 ;;
        esac

        VER="$INPUT_VERSION"
        if [ "$VER" = "latest" ]; then
          VER="$(curl -sSfL \
                   -H "Authorization: Bearer ${GH_TOKEN}" \
                   -H "X-GitHub-Api-Version: 2022-11-28" \
                   https://api.github.com/repos/goweft/temple/releases/latest \
                 | sed -n 's/.*"tag_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' | head -n1)"
          if [ -z "$VER" ]; then
            echo "temple: could not resolve the latest release. Pin an explicit version." >&2
            exit 1
          fi
        fi
        VER="${VER#v}"

        ASSET="temple_${VER}_${OS}_${ARCH}.tar.gz"
        BASE="https://github.com/goweft/temple/releases/download/v${VER}"
        DEST="${RUNNER_TEMP}/temple-${VER}"
        mkdir -p "$DEST"
        cd "$DEST"

        curl -sSfL -o "$ASSET" "${BASE}/${ASSET}"
        curl -sSfL -o checksums.txt "${BASE}/checksums.txt"

        # Fail closed. The asset must be listed in the release's checksum manifest
        # and must match it. An asset absent from the manifest is a failure, not a
        # shrug. (This verifies integrity of the download, not provenance of the
        # release — signing would be needed for that.)
        if ! awk -v f="$ASSET" '$2 == f { print; found = 1 } END { exit !found }' \
             checksums.txt > asset.sha256; then
          echo "temple: $ASSET is not listed in checksums.txt for v${VER}" >&2
          exit 1
        fi

        if command -v sha256sum >/dev/null 2>&1; then
          sha256sum -c asset.sha256
        else
          shasum -a 256 -c asset.sha256
        fi

        tar xzf "$ASSET" temple
        chmod +x temple
        echo "$DEST" >> "$GITHUB_PATH"

    - name: temple check
      shell: bash
      run: |
        temple check \
          --root "${{ inputs.root }}" \
          --config "${{ inputs.config }}" \
          --format "${{ inputs.format }}"
