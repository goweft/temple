name: "temple"
description: "Fail the build when a repo drifts past its declared single-purpose scope."
branding:
  icon: "crop"
  color: "purple"

inputs:
  version:
    description: "temple version to use (default: latest)."
    required: false
    default: "latest"
  config:
    description: "Path to the scope contract."
    required: false
    default: "temple.toml"
  root:
    description: "Repo root to inspect."
    required: false
    default: "."
  format:
    description: "Output format: text, json, or sarif."
    required: false
    default: "text"

runs:
  using: "composite"
  steps:
    - name: download temple binary
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64)  ARCH="amd64" ;;
          aarch64) ARCH="arm64" ;;
        esac
        if [ "$VERSION" = "latest" ]; then
          VERSION=$(curl -sf https://api.github.com/repos/goweft/temple/releases/latest \
            | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
        fi
        URL="https://github.com/goweft/temple/releases/download/v${VERSION}/temple_${VERSION}_${OS}_${ARCH}.tar.gz"
        curl -sfL "$URL" | tar xz temple
        chmod +x temple
        echo "$PWD" >> "$GITHUB_PATH"
    - name: temple check
      shell: bash
      run: |
        temple check \
          --root "${{ inputs.root }}" \
          --config "${{ inputs.config }}" \
          --format "${{ inputs.format }}"
