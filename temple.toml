# temple.toml — temple's own scope contract.
# Yes, temple guards itself. This file is the whole point of the tool.

[scope]
purpose = "Fail the build when a repo drifts past its declared single-purpose scope. Nothing more."

# Every git-tracked file must match at least one of these globs.
allow = [
  "cmd/**",
  "internal/**",
  ".github/**",
  "*.md",
  "*.toml",
  "*.yml",
  "go.mod",
  "go.sum",
  "LICENSE",
  ".gitignore",
]

# Hard budgets.
max_files = 20
# Set to 1100 in v0.3.0 (Go port). The self-check measured 1045 lines;
# Go test files are more verbose than Python's unittest (explicit type
# assertions, no assertEqual sugar), which accounts for the difference.
# Budget set to 1100 — raised on purpose, documented here, same commit.
max_lines = 1100
max_deps  = 0

# The "does NOT do" list — enforced, not just documented.
# temple must stay network-free and single-purpose.
# Single-quoted = TOML literal strings (no escape processing).
forbid = [
  'net/http',
  'net/rpc',
  'database/sql',
]
