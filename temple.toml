# temple.toml — temple's own scope contract.
# Yes, temple guards itself. This file is the whole point of the tool.

[scope]
purpose = "Fail the build when a repo drifts past its declared single-purpose scope. Nothing more."

# Every git-tracked file must match at least one of these globs.
# Anything outside is drift, and temple fails the build.
allow = [
  "temple/**",
  "tests/**",
  ".github/**",
  "*.md",
  "*.toml",
  "action.yml",
  "LICENSE",
  ".gitignore",
]

# Hard budgets. These are the guardrails that stop "one small addition"
# from quietly becoming a framework.
max_files = 20
# Raised 600 -> 700 in v0.2.0, when --format sarif landed. SARIF is a real
# feature (envelope + rule set + fingerprints, ~180 source lines), so the
# budget grew here — on purpose, in the same diff, as a reviewable line —
# rather than by the silent drift temple exists to catch.
max_lines = 700
max_deps  = 0

# The "does NOT do" list — enforced, not just documented.
# temple must stay a zero-dependency, network-free, single-purpose CLI.
# (Entries are regexes, matched line-by-line against source files.)
forbid = [
  "import requests",
  "import httpx",
  "import urllib.request",
  "from flask",
  "from fastapi",
]
