name: temple
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: unit tests
        run: go test ./... -v

  scope:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build
        run: go build -o temple-bin ./cmd/temple/
      - name: temple checks its own scope (SARIF)
        id: scope
        run: ./temple-bin check --format sarif > temple.sarif
        continue-on-error: true
      - name: upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: temple.sarif
      - name: enforce scope
        if: steps.scope.outcome == 'failure'
        run: |
          echo "temple: scope breach — see the Code scanning alerts."
          exit 1

  release:
    # v0 is a moving major tag (Marketplace convention) that always points
    # at some already-released commit. goreleaser resolves its version via
    # git describe on the commit, not the ref that triggered the run, so a
    # push of a dotless tag like v0 collides with the release goreleaser
    # already made for the real tag on that commit -- or worse, if v0 is
    # ever moved ahead of a real release tag, git describe emits a dirty
    # string (v0.3.1-N-gHASH) and goreleaser will happily cut a spurious
    # release under that name. Gate on a dot so only exact version tags
    # (v0.3.1) reach goreleaser; the moving tag never does.
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref_name, '.')
    needs: [test, scope]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
