name: temple
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: unit tests
        run: go test ./... -v

  scope:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: build
        run: go build -o temple-bin ./cmd/temple/
      - name: temple checks its own scope (SARIF)
        id: scope
        run: ./temple-bin check --format sarif > temple.sarif
        continue-on-error: true
      - name: upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: temple.sarif
      - name: enforce scope
        if: steps.scope.outcome == 'failure'
        run: |
          echo "temple: scope breach — see the Code scanning alerts."
          exit 1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, scope]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
