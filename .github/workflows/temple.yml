name: temple
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: unit tests
        run: python -m unittest discover -s tests -v

  scope:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: temple checks its own scope (SARIF)
        id: scope
        run: python -m temple check --format sarif > temple.sarif
        continue-on-error: true
      - name: upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: temple.sarif
      - name: enforce scope
        if: steps.scope.outcome == 'failure'
        run: |
          echo "temple: scope breach — see the Code scanning alerts."
          exit 1
