version: 2

project_name: temple

before:
  hooks:
    - go mod tidy

builds:
  - id: temple
    main: ./cmd/temple/
    binary: temple
    ldflags:
      - -s -w
      - -X github.com/goweft/temple/internal.Version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: temple
    name_template: "temple_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

release:
  github:
    owner: goweft
    name: temple
  name_template: "temple {{.Tag}}"
  draft: false

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
