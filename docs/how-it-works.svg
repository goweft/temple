<svg width="100%" viewBox="0 0 1260 320" xmlns="http://www.w3.org/2000/svg" role="img">
<title>How temple checks a repo</title>
<desc>temple.toml feeds five checks — structure, files, lines, deps, forbid — which produce one of three verdicts: pass, fail, or error.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="#6f63b3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect x="0" y="0" width="1260" height="320" fill="#14121f"/>

<rect x="40" y="110" width="160" height="70" rx="8" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="120" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">temple.toml</text>
<text x="120" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b8b0d1">scope contract</text>

<line x1="200" y1="145" x2="248" y2="145" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="250" y="110" width="130" height="70" rx="8" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="315" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">structure</text>
<text x="315" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b8b0d1">allowed path</text>
<line x1="380" y1="145" x2="398" y2="145" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="400" y="110" width="130" height="70" rx="8" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="465" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">files</text>
<text x="465" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b8b0d1">under max_files</text>
<line x1="530" y1="145" x2="548" y2="145" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="550" y="110" width="130" height="70" rx="8" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="615" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">lines</text>
<text x="615" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b8b0d1">under max_lines</text>
<line x1="680" y1="145" x2="698" y2="145" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="700" y="110" width="130" height="70" rx="8" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="765" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">deps</text>
<text x="765" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b8b0d1">under max_deps</text>
<line x1="830" y1="145" x2="848" y2="145" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="850" y="110" width="130" height="70" rx="8" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="915" y="138" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">forbid</text>
<text x="915" y="160" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b8b0d1">banned pattern</text>

<line x1="980" y1="145" x2="1008" y2="145" stroke="#6f63b3" stroke-width="1.5"/>
<path d="M1010,145 L1010,80 L1048,80" fill="none" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M1010,145 L1030,145 L1030,160 L1048,160" fill="none" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M1010,145 L1010,240 L1048,240" fill="none" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow)"/>

<rect x="1050" y="55" width="140" height="50" rx="25" fill="#1a2a1f" stroke="#4ade80" stroke-width="1"/>
<text x="1120" y="85" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#4ade80">PASS · exit 0</text>

<rect x="1050" y="135" width="140" height="50" rx="25" fill="#2a1a1a" stroke="#f87171" stroke-width="1"/>
<text x="1120" y="165" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f87171">FAIL · exit 1</text>

<rect x="1050" y="215" width="140" height="50" rx="25" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="1120" y="245" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#a8a3bd">ERROR · exit 2</text>
</svg>
