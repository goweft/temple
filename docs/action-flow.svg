<svg width="100%" viewBox="0 0 1000 260" xmlns="http://www.w3.org/2000/svg" role="img">
<title>What the GitHub Action does</title>
<desc>On push or pull request, the action downloads the matched release binary, verifies it against the release checksum failing closed, runs temple check, and produces an exit code and optionally a SARIF report for code scanning.</desc>
<defs>
  <marker id="arrow2" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M1 1L8 5L1 9" fill="none" stroke="#6f63b3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>
<rect x="0" y="0" width="1000" height="260" fill="#14121f"/>

<rect x="40" y="95" width="150" height="70" rx="8" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="115" y="123" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">trigger</text>
<text x="115" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b8b0d1">push or PR</text>
<line x1="190" y1="130" x2="208" y2="130" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="210" y="95" width="150" height="70" rx="8" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="285" y="123" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">download</text>
<text x="285" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b8b0d1">matched binary</text>
<line x1="360" y1="130" x2="378" y2="130" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="380" y="95" width="150" height="70" rx="8" fill="#1f1b2e" stroke="#8b7cf6" stroke-width="1.5"/>
<text x="455" y="123" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">verify</text>
<text x="455" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#8b7cf6">fails closed</text>
<line x1="530" y1="130" x2="548" y2="130" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="550" y="95" width="150" height="70" rx="8" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="625" y="123" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">temple check</text>
<text x="625" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b8b0d1">runs the binary</text>

<line x1="700" y1="130" x2="728" y2="130" stroke="#6f63b3" stroke-width="1.5"/>
<path d="M730,130 L730,95 L768,95" fill="none" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow2)"/>
<path d="M730,130 L730,195 L768,195" fill="none" stroke="#6f63b3" stroke-width="1.5" marker-end="url(#arrow2)"/>

<rect x="770" y="70" width="160" height="50" rx="8" fill="#1f1b2e" stroke="#4a3f8a" stroke-width="1"/>
<text x="850" y="92" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">exit code</text>
<text x="850" y="110" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#b8b0d1">0 · 1 · 2</text>

<rect x="770" y="170" width="160" height="50" rx="8" fill="#1f1b2e" stroke="#8b7cf6" stroke-width="1"/>
<text x="850" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" fill="#f4f2fa">SARIF upload</text>
<text x="850" y="210" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#8b7cf6">code scanning</text>
</svg>
